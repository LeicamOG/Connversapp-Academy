<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversapp Academy</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/vAJo2nR.png" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fontes: Inter (UI) + JetBrains Mono (Tech) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">

  <!-- Estilos Customizados -->
  <link rel="stylesheet" href="/styles.css">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            brand: {
              primary: '#25D366',    // Verde Neon WhatsApp
              'primary-bright': '#34E47A',
              secondary: '#1ea952',  // Verde escuro
              dark: '#050707',       // Fundo Principal (midnight ink)
              card: '#0B0D0C',       // Surface Cards
              'card-raised': '#0F1211',
              surface: '#0F1312',    // Surface Highlight
              'surface-2': '#131817',
              hover: '#161B1A',      // Hover State
              inset: '#070909',
              accent: '#25D366',
              aurora: '#7BE8B3',     // Accent highlight
            },
            neon: {
              DEFAULT: '#25D366',
              bright: '#34E47A',
              glow: 'rgba(37, 211, 102, 0.12)',
              'glow-strong': 'rgba(37, 211, 102, 0.22)',
              border: 'rgba(37, 211, 102, 0.22)',
            },
            ink: {
              100: '#FFFFFF',
              200: '#C8CFCD',
              300: '#8A928F',
              400: '#5C6361',
              500: '#3D4441',
            }
          },
          boxShadow: {
            'neon': '0 0 0 1px rgba(37, 211, 102, 0.35), 0 12px 40px -12px rgba(37, 211, 102, 0.22)',
            'neon-lg': '0 0 0 1px rgba(37, 211, 102, 0.35), 0 24px 60px -12px rgba(37, 211, 102, 0.22)',
            'premium-md': '0 8px 24px -8px rgba(0, 0, 0, 0.55), 0 2px 6px rgba(0, 0, 0, 0.35)',
            'premium-lg': '0 24px 48px -16px rgba(0, 0, 0, 0.7), 0 8px 16px -8px rgba(0, 0, 0, 0.4)',
          },
          backgroundImage: {
            'gradient-premium': 'linear-gradient(135deg, #34E47A 0%, #25D366 45%, #1ea952 100%)',
            'gradient-hero': 'radial-gradient(ellipse at top, rgba(37, 211, 102, 0.18) 0%, rgba(37, 211, 102, 0.04) 35%, transparent 70%)',
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'slide-up': 'slideUp 0.5s ease-out',
            'fade-in': 'fadeIn 0.3s ease-in',
          },
          keyframes: {
            slideUp: {
              '0%': { transform: 'translateY(10px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            }
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --color-primary: #25D366;
      --color-secondary: #1ea952;
    }

    html {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      width: 100vw;
      min-height: 100dvh;
      margin: 0;
      padding: 0;
      background-color: #050505;
      color: #E1E1E6;
      overflow-x: hidden;
    }

    #root {
      width: 100%;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Background Grid Pattern */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Noise Texture */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient Glow Orbs */
    .glow-orb {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37, 211, 102, 0.08) 0%, transparent 70%);
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .glow-orb-1 {
      width: 500px;
      height: 500px;
      top: -250px;
      right: -250px;
    }

    .glow-orb-2 {
      width: 400px;
      height: 400px;
      bottom: -200px;
      left: -200px;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #050505;
    }

    ::-webkit-scrollbar-thumb {
      background: #1a1a1a;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #25D366;
    }
  </style>

  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@18.3.1/",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react/": "https://esm.sh/react@18.3.1/",
    "react": "https://esm.sh/react@18.3.1",
    "recharts": "https://esm.sh/recharts@^2.12.3?external=react,react-dom",
    "lucide-react": "https://esm.sh/lucide-react@^0.363.0?external=react,react-dom",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react,react-dom",
    "@dnd-kit/core": "https://esm.sh/@dnd-kit/core@6.1.0?external=react,react-dom",
    "@dnd-kit/sortable": "https://esm.sh/@dnd-kit/sortable@8.0.0?external=react,react-dom",
    "@dnd-kit/utilities": "https://esm.sh/@dnd-kit/utilities@3.2.2?external=react,react-dom",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.3"
  }
}
</script>
</head>

<body>
  <!-- Ambient Light Blobs (Cinema Mobile Dark style) -->
  <div class="ambient-blob ambient-blob-1" aria-hidden="true"></div>
  <div class="ambient-blob ambient-blob-2" aria-hidden="true"></div>
  <div class="ambient-blob ambient-blob-3" aria-hidden="true"></div>

  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
